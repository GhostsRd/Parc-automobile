name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Se déclenche lors d'un push sur main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: 🔐 Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Utilisez un Access Token Docker Hub ici

      - name: 🏗️ Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚀 Construire et pousser l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Remplacez "facturation" par le nom du dépôt Docker Hub souhaité pour cette autre app
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-autre-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-autre-app:${{ github.sha }}
